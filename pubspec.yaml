name: autodemy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  csv: ^6.0.0
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  url_launcher: ^6.2.6
  google_fonts: ^6.2.1
  http: ^1.2.1
  local_auth: ^2.1.8
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
  table_calendar: ^3.1.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.5.2
  fl_chart: ^0.71.0
  socket_io_client: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  google_mlkit_text_recognition: ^0.13.0
  connectivity_plus: ^6.1.0
  device_info_plus: ^10.0.0
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  screen_protector: ^1.5.1
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/10ebdc69-cb3b-4329-a7d5-689a6a45724e.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/10ebdc69-cb3b-4329-a7d5-689a6a45724e.png"
  min_sdk_android: 21
